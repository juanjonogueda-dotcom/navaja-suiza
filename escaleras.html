<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escaleras — Navaja Suiza</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #000000;
    --surface:      #0d0d0d;
    --border:       rgba(255,255,255,0.1);
    --border-hover: rgba(255,255,255,0.25);
    --text:         #ffffff;
    --text-mid:     rgba(255,255,255,0.6);
    --text-muted:   rgba(255,255,255,0.3);
    --accent:       #ffffff;
    --warn:         #ff6b6b;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .num { font-family: 'JetBrains Mono', monospace; font-feature-settings: 'tnum' 1; }

  .page {
    display: grid;
    grid-template-rows: auto 1fr;
    height: 100vh;
    padding: clamp(20px, 2.5vh, 36px) clamp(24px, 4vw, 56px) 0;
    gap: 0;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    padding-bottom: clamp(14px, 1.8vh, 22px);
    border-bottom: 1px solid var(--border);
    margin-bottom: clamp(14px, 1.8vh, 22px);
    flex-shrink: 0;
  }

  .back-link {
    font-size: clamp(36px, 5vw, 64px);
    font-weight: 800;
    color: var(--text-muted);
    text-decoration: none;
    letter-spacing: -0.04em;
    line-height: 0.9;
    transition: color 0.15s;
  }
  .back-link:hover { color: var(--text); }

  h1 {
    font-size: clamp(36px, 5vw, 64px);
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 0.9;
  }

  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: clamp(24px, 4vw, 56px);
    min-height: 0;
    overflow: hidden;
  }

  .sidebar {
    overflow-y: auto;
    padding-right: 8px;
    padding-bottom: 48px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .main-area {
    overflow-y: auto;
    padding-bottom: 56px;
    min-height: 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .main-area::-webkit-scrollbar { width: 4px; }
  .main-area::-webkit-scrollbar-track { background: transparent; }
  .main-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .section-head {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: lowercase;
    margin-bottom: 16px;
  }
  .section-head .num-mark { color: var(--text-muted); margin-right: 8px; }

  .input-stack { display: flex; flex-direction: column; gap: 24px; margin-bottom: 28px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field-label { font-size: 0.88rem; color: var(--text-mid); font-weight: 500; }

  .field-input {
    font-family: 'JetBrains Mono', monospace;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-size: clamp(22px, 2.5vw, 28px);
    font-weight: 400;
    padding: 4px 0;
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
    -moz-appearance: textfield;
  }
  .field-input::-webkit-inner-spin-button,
  .field-input::-webkit-outer-spin-button { display: none; }
  .field-input:focus { border-bottom-color: var(--text); }
  .field-input.computed { color: var(--text-mid); border-bottom-style: dashed; }

  .field-unit {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    margin-top: 2px;
  }
  .field-unit.computed-label { color: rgba(255,255,255,0.2); font-style: italic; }

  .toggles { display: flex; flex-direction: column; gap: 20px; }
  .toggle-block { display: flex; flex-direction: column; gap: 8px; }
  .toggle-label { font-size: 0.88rem; color: var(--text-mid); font-weight: 500; }
  .input-stack + .section-head { margin-top: 28px; }

  .result-display { margin-bottom: 32px; }
  .result-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: lowercase;
    margin-bottom: 12px;
  }
  .result-display.ok .result-tag { color: var(--text-mid); }
  .result-display.fail .result-tag { color: var(--warn); }

  .result-big {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(64px, 7vw, 96px);
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.04em;
    line-height: 0.9;
    margin-bottom: 16px;
    font-feature-settings: 'tnum' 1;
    transition: color 0.3s ease;
  }
  .result-display.fail .result-big { color: var(--warn); }
  .result-big .unit-sm {
    font-size: 0.5em;
    color: var(--text-muted);
    font-weight: 400;
    margin-left: -4px;
  }
  .result-big .compare {
    font-size: 16px;
    color: var(--text-muted);
    font-weight: 400;
    margin-left: 14px;
  }

  .result-line {
    font-size: 15px;
    color: var(--text-mid);
    line-height: 1.55;
    max-width: 560px;
    margin-bottom: 6px;
  }
  .result-line em { font-style: normal; color: var(--text); font-weight: 500; }
  .result-cat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    margin-top: 12px;
  }
  .result-cat b { color: var(--text); font-weight: 500; }

  .metrics-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .metric-cell { padding: 0 20px; }
  .metric-cell:first-child { padding-left: 0; }
  .metric-cell:last-child { padding-right: 0; }
  .metric-num-mark {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }
  .metric-label { font-size: 0.82rem; color: var(--text-mid); margin-bottom: 6px; }
  .metric-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    color: var(--text);
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1;
    font-feature-settings: 'tnum' 1;
  }
  .metric-value .unit { font-size: 13px; color: var(--text-muted); margin-left: 4px; }

  .hint-block { margin-bottom: 36px; }
  .hint-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: lowercase;
    margin-bottom: 10px;
  }
  .hint {
    font-size: 14px;
    color: var(--text-mid);
    line-height: 1.65;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    max-width: 680px;
  }
  .hint b { color: var(--text); font-weight: 600; }
  .hint.warn { color: var(--warn); border-color: rgba(255,107,107,0.25); }

  .diagram-block { margin-bottom: 48px; }
  .diagram-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    gap: 16px;
  }
  .diagram-title { font-size: 1rem; font-weight: 600; color: var(--text); }
  .diagram-title em { font-style: normal; color: var(--text-mid); font-weight: 400; }
  .diagram-head-right { display: flex; align-items: center; gap: 12px; }
  .diagram-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
  }
  .export-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    color: var(--text-mid);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.78rem;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: color 0.15s, border-color 0.15s;
  }
  .export-btn:hover { color: var(--text); border-color: var(--border-hover); }
  .export-btn svg { width: 13px; height: 13px; }

  .diagram-svg { width: 100%; overflow-x: hidden; }
  .diagram-svg svg { display: block; width: 100%; }

  .norm-ref {
    margin-top: 40px;
    padding-top: 32px;
    border-top: 1px solid var(--border);
  }
  .norm-desc { font-size: 0.88rem; color: var(--text-mid); line-height: 1.6; margin-bottom: 20px; }
  .norm-table {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 0;
    width: 100%;
  }
  .norm-table > div {
    padding: 10px 14px 10px 0;
    border-bottom: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-mid);
  }
  .norm-table .head {
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: lowercase;
    border-bottom: 1px solid var(--border-hover);
  }
  .norm-table .cell-active { color: var(--text) !important; font-weight: 500; }
  .norm-table .norm-row-label {
    font-size: 0.85rem;
    color: var(--text-mid);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-5px); }
    40%      { transform: translateX(5px); }
    60%      { transform: translateX(-3px); }
    80%      { transform: translateX(2px); }
  }
  .shake { animation: shake 200ms ease; }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: var(--bg);
    padding: 10px 20px;
    border-radius: 100px;
    font-size: 0.82rem;
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 760px) {
    html, body { overflow: auto; }
    .page { height: auto; overflow: visible; padding: 24px 20px 0; }
    .layout { grid-template-columns: 1fr; overflow: visible; }
    .sidebar { overflow: visible; padding-right: 0; padding-bottom: 0; }
    .main-area { overflow: visible; padding-bottom: 56px; }
    .metrics-row { grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .metric-cell { padding: 0; }
    .diagram-head { flex-direction: column; align-items: flex-start; }
    .norm-ref { display: none; }
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <a class="back-link" href="index.html">←</a>
    <h1>Escaleras</h1>
  </header>

  <div class="layout">
    <aside class="sidebar">

      <div class="section-head"><span class="num-mark">01</span>parámetros</div>
      <div class="input-stack">
        <div class="field">
          <span class="field-label">Peralte (h)</span>
          <input type="number" class="field-input" id="inp-h" placeholder="17.5" step="0.5" min="0" oninput="calc()">
          <span class="field-unit" id="unit-h">cm</span>
        </div>
        <div class="field">
          <span class="field-label">Contrahuella (a)</span>
          <input type="number" class="field-input" id="inp-a" placeholder="28" step="0.5" min="0" oninput="calc()">
          <span class="field-unit" id="unit-a">cm</span>
        </div>
        <div class="field">
          <span class="field-label">Altura total (H)</span>
          <input type="number" class="field-input" id="inp-H" placeholder="2.80" step="0.01" min="0" oninput="calc()">
          <span class="field-unit" id="unit-H">m</span>
        </div>
      </div>

      <div class="section-head"><span class="num-mark">02</span>configuración</div>
      <div class="toggles">

        <div class="toggle-block">
          <span class="toggle-label">Longitud disponible</span>
          <input type="number" class="field-input" id="inp-L" placeholder="— opcional" step="0.1" min="0" oninput="calc()" style="font-size:18px">
          <span class="field-unit">m · opcional</span>
        </div>

        <div class="toggle-block">
          <span class="toggle-label">Ancho de escalera</span>
          <input type="number" class="field-input" id="inp-ancho" value="1.20" step="0.05" min="0.5" oninput="calc()" style="font-size:18px">
          <span class="field-unit">m</span>
        </div>

      </div>
    </aside>

    <div class="main-area">
      <div class="section-head"><span class="num-mark">03</span>resultado</div>
      <div id="result-zone" aria-live="polite"></div>
      <div id="hint-zone"></div>
      <div id="diagrams-zone"></div>

      <div class="norm-ref" id="norm-ref-section">
        <div class="section-head"><span class="num-mark">06</span>norma aplicada · RCDF</div>
        <p class="norm-desc">Límites normativos para diseño de escaleras.</p>
        <div class="norm-table" id="norm-table"></div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
function saveState() {
  try {
    localStorage.setItem('escaleras_h',     document.getElementById('inp-h').value);
    localStorage.setItem('escaleras_a',     document.getElementById('inp-a').value);
    localStorage.setItem('escaleras_H',     document.getElementById('inp-H').value);
    localStorage.setItem('escaleras_L',     document.getElementById('inp-L').value);
    localStorage.setItem('escaleras_ancho', document.getElementById('inp-ancho').value);
  } catch (e) {}
}

function loadState() {
  try {
    const sh    = localStorage.getItem('escaleras_h');
    const sa    = localStorage.getItem('escaleras_a');
    const sH    = localStorage.getItem('escaleras_H');
    const sL    = localStorage.getItem('escaleras_L');
    const sAncho = localStorage.getItem('escaleras_ancho');
    if (sh)    document.getElementById('inp-h').value     = sh;
    if (sa)    document.getElementById('inp-a').value     = sa;
    if (sH)    document.getElementById('inp-H').value     = sH;
    if (sL)    document.getElementById('inp-L').value     = sL;
    if (sAncho) document.getElementById('inp-ancho').value = sAncho;
  } catch (e) {}
  calc();
}

function getNorma() {
  return { hMin: 15, hMax: 20, aMin: 25, aMax: 32, bMin: 63, bMax: 65, saMin: 43, saMax: 50, nMax: 15 };
}

function blondel(h, a) { return 2 * h + a; }

function resolveInputs() {
  const hRaw = parseFloat(document.getElementById('inp-h').value);
  const aRaw = parseFloat(document.getElementById('inp-a').value);
  const HRaw = parseFloat(document.getElementById('inp-H').value);
  const hOk = !isNaN(hRaw) && hRaw > 0;
  const aOk = !isNaN(aRaw) && aRaw > 0;
  const HOk = !isNaN(HRaw) && HRaw > 0;
  const count = (hOk ? 1 : 0) + (aOk ? 1 : 0) + (HOk ? 1 : 0);

  if (count < 2) return { state: 'partial', hOk, aOk, HOk, hRaw, aRaw, HRaw };

  let h, a, H, computed = null;

  if (hOk && aOk && HOk) {
    h = hRaw; a = aRaw; H = HRaw;
  } else if (hOk && aOk) {
    return { state: 'partial-ha', h: hRaw, a: aRaw };
  } else if (hOk && HOk) {
    H = HRaw; h = hRaw;
    const n = Math.max(1, Math.round(H * 100 / h));
    h = (H * 100) / n;
    a = Math.max(15, 63 - 2 * h);
    computed = 'a';
  } else if (aOk && HOk) {
    H = HRaw; a = aRaw;
    h = Math.max(5, (63 - a) / 2);
    const n = Math.max(1, Math.round(H * 100 / h));
    h = (H * 100) / n;
    computed = 'h';
  }

  return { state: 'solve', h, a, H, computed };
}

function calc() {
  const res = resolveInputs();
  const norma = getNorma();
  const LRaw = parseFloat(document.getElementById('inp-L').value);
  const LOk = !isNaN(LRaw) && LRaw > 0;
  const ancho = parseFloat(document.getElementById('inp-ancho').value) || 1.20;
  const inpH = document.getElementById('inp-h');
  const inpA = document.getElementById('inp-a');
  const unitH = document.getElementById('unit-h');
  const unitA = document.getElementById('unit-a');

  inpH.classList.remove('computed'); inpA.classList.remove('computed');
  unitH.className = 'field-unit'; unitA.className = 'field-unit';
  unitH.textContent = 'cm'; unitA.textContent = 'cm';

  if (res.state === 'partial') {
    renderPartial(res, norma);
    document.getElementById('diagrams-zone').innerHTML = '';
    renderNormTable(null, norma);
    saveState();
    return;
  }

  if (res.state === 'partial-ha') {
    const b = blondel(res.h, res.a);
    const bOk = b >= norma.bMin && b <= norma.bMax;
    document.getElementById('result-zone').innerHTML = `
      <div class="result-display ok">
        <div class="result-tag">blondel · introduce H para calcular escalones</div>
        <div class="result-big"><span class="num">${b.toFixed(1)}</span><span class="unit-sm">cm</span></div>
        <div class="result-line">2h + a = 2×${res.h.toFixed(1)} + ${res.a.toFixed(1)} = <em>${b.toFixed(1)} cm</em> ${bOk ? '✓ en rango óptimo 63–65 cm' : '· fuera del rango óptimo 63–65 cm'}</div>
      </div>`;
    document.getElementById('hint-zone').innerHTML = `<div class="hint-block"><div class="hint-label">siguiente paso</div><div class="hint">Introduce la <b>altura total H</b> para calcular el número de escalones.</div></div>`;
    document.getElementById('diagrams-zone').innerHTML = '';
    renderNormTable(null, norma);
    saveState();
    return;
  }

  if (res.computed === 'a') {
    inpA.classList.add('computed');
    inpA.placeholder = '→ ' + res.a.toFixed(2);
    unitA.className = 'field-unit computed-label';
    unitA.textContent = 'calculado';
  }
  if (res.computed === 'h') {
    inpH.classList.add('computed');
    inpH.placeholder = '→ ' + res.h.toFixed(2);
    unitH.className = 'field-unit computed-label';
    unitH.textContent = 'calculado';
  }

  const { h, a, H } = res;
  const n = Math.max(1, Math.round(H * 100 / h));
  const hReal = (H * 100) / n;
  const L = n * a / 100;
  const zanca = Math.sqrt(H * H + L * L);
  const angulo = Math.atan2(H, L) * 180 / Math.PI;
  const pendiente = (H / L) * 100;
  const b = blondel(hReal, a);
  const suma = hReal + a;

  /* tramos: auto, ceil(n/15), balanced distribution */
  const DESCANSO_MIN = 1.20;
  const tCount = Math.max(1, Math.ceil(n / norma.nMax));
  const tBase = Math.floor(n / tCount), tExtra = n % tCount;
  const tArr = [];
  for (let i = 0; i < tCount; i++) tArr.push(tBase + (i < tExtra ? 1 : 0));
  const tramosData = { t: tCount, tramos: tArr, nDescansos: tCount - 1, descansoMin: DESCANSO_MIN };

  const maxPerTramo = Math.max(...tramosData.tramos);
  const hInNorma  = hReal >= norma.hMin  && hReal <= norma.hMax;
  const aInNorma  = a    >= norma.aMin   && a    <= norma.aMax;
  const bInNorma  = b    >= norma.bMin   && b    <= norma.bMax;
  const saInNorma = suma >= norma.saMin  && suma <= norma.saMax;
  const nMaxOk    = maxPerTramo <= norma.nMax;
  const cumple    = hInNorma && aInNorma && bInNorma && saInNorma && nMaxOk;
  const bOptimo   = b >= 63 && b <= 65;
  const warn      = cumple && (!bOptimo || maxPerTramo >= norma.nMax - 2);

  const lTotal = L + tramosData.nDescansos * DESCANSO_MIN;

  let lHint = '';
  if (LOk) {
    const diff = lTotal - LRaw;
    if (diff > 0.01) {
      lHint = `<div class="hint warn">Faltan <b>${diff.toFixed(2)} m</b> de longitud. La escalera necesita <b>${lTotal.toFixed(2)} m</b> pero hay ${LRaw.toFixed(2)} m disponibles.</div>`;
    } else if (LRaw - lTotal > 0.5) {
      const margen = LRaw - lTotal;
      const aMax2 = Math.min(norma.aMax, a + margen * 100 / n);
      lHint = `<div class="hint">Tienes <b>${margen.toFixed(2)} m</b> de margen — podrías aumentar la contrahuella hasta <b>${aMax2.toFixed(1)} cm</b>.</div>`;
    }
  }

  renderResult({ h: hReal, a, H, n, b, suma, L, zanca, angulo, pendiente, tramosData, cumple, warn, norma, hInNorma, aInNorma, bInNorma, saInNorma, nMaxOk, bOptimo, maxPerTramo });
  renderHint({ h: hReal, a, H, n, b, cumple, warn, bOptimo, maxPerTramo, norma, lHint, nMaxOk });
  renderDiagrams({ h: hReal, a, H, n, L, zanca, angulo, tramosData, cumple, ancho });
  renderNormTable({ hReal, a, b, suma, maxPerTramo }, norma);
  saveState();
}

function renderPartial(res, norma) {
  const zone = document.getElementById('result-zone');
  const hint = document.getElementById('hint-zone');

  if (!res.hOk && !res.aOk && !res.HOk) {
    zone.innerHTML = '';
    hint.innerHTML = `<div class="hint-block"><div class="hint-label">instrucciones</div><div class="hint">Introduce dos de los tres parámetros — <b>peralte</b>, <b>contrahuella</b> o <b>altura total</b> — para calcular el faltante y verificar normativa.</div></div>`;
    return;
  }

  let hintText = '';
  if (res.hOk && !res.aOk && !res.HOk) {
    const aSug = 63 - 2 * res.hRaw;
    hintText = `Con peralte h=${res.hRaw} cm, Blondel sugiere una contrahuella de <b>${aSug.toFixed(1)} cm</b>. Introduce H para calcular escalones.`;
  } else if (!res.hOk && res.aOk && !res.HOk) {
    const hSug = (63 - res.aRaw) / 2;
    hintText = `Con contrahuella a=${res.aRaw} cm, Blondel sugiere un peralte de <b>${hSug.toFixed(1)} cm</b>. Introduce H para calcular escalones.`;
  } else if (!res.hOk && !res.aOk && res.HOk) {
    hintText = `Con H=${res.HRaw} m, un punto de partida clásico es <b>h=17.5 cm</b> y <b>a=28 cm</b> (Blondel=63 cm ✓).`;
  }

  zone.innerHTML = '';
  hint.innerHTML = hintText
    ? `<div class="hint-block"><div class="hint-label">sugerencia</div><div class="hint">${hintText}</div></div>`
    : '';
}

function renderResult(st) {
  const zone = document.getElementById('result-zone');
  const { h, a, H, n, b, suma, L, zanca, angulo, pendiente, tramosData, cumple, warn, hInNorma, aInNorma, bInNorma, saInNorma, nMaxOk, bOptimo, maxPerTramo } = st;

  const hInLimits = h >= 5 && h <= 30;
  const aInLimits = a >= 15;
  if (!hInLimits || !aInLimits || n === 0) {
    let msg = '';
    if (h < 5)  msg = 'Peralte demasiado pequeño (mínimo 5 cm).';
    else if (h > 30) msg = 'Peralte excesivo (máximo 30 cm).';
    else if (a < 15) msg = 'Contrahuella insuficiente para el pie (mínimo 15 cm).';
    else if (n === 0) msg = 'Altura menor a un peralte — no se requiere escalera. Considera una rampa o un escalón.';
    zone.innerHTML = `<div class="result-display fail">
      <div class="result-tag">error de diseño</div>
      <div class="result-big">&mdash;</div>
      <div class="result-line"><em>${msg}</em></div>
    </div>`;
    triggerShake(zone);
    return;
  }

  const cls = cumple ? 'ok' : 'fail';
  const tagText = cumple ? (warn ? 'cumple con observaciones' : 'cumple normativa') : 'no cumple normativa';
  const bColor = b >= 63 && b <= 65 ? 'var(--text)' : b >= st.norma.bMin && b <= st.norma.bMax ? 'var(--text-mid)' : 'var(--warn)';

  const nEscStr = n === 1 ? '1 escalón' : `${n} escalones`;
  const tramosStr = tramosData.t === 1
    ? 'tramo único, sin descansos'
    : `${tramosData.t} tramos (${tramosData.tramos.join('+')} escalones) con ${tramosData.nDescansos} descanso${tramosData.nDescansos > 1 ? 's' : ''} de ${tramosData.descansoMin.toFixed(2)} m`;

  zone.innerHTML = `<div class="result-display ${cls}">
    <div class="result-tag">${tagText}</div>
    <div class="result-big"><span class="num">${n}</span><span class="unit-sm"> escalones</span></div>
    <div class="result-line">${nEscStr} · ${tramosStr}</div>
    <div class="result-cat">Blondel <b style="color:${bColor}">${b.toFixed(1)} cm</b> · h+a = <b>${suma.toFixed(1)} cm</b> · pendiente <b>${pendiente.toFixed(1)}%</b></div>
    <div class="metrics-row">
      <div class="metric-cell"><div class="metric-num-mark">01</div><div class="metric-label">Peralte real</div><div class="metric-value num">${h.toFixed(2)}<span class="unit">cm</span></div></div>
      <div class="metric-cell"><div class="metric-num-mark">02</div><div class="metric-label">Long. horizontal</div><div class="metric-value num">${L.toFixed(2)}<span class="unit">m</span></div></div>
      <div class="metric-cell"><div class="metric-num-mark">03</div><div class="metric-label">Zanca</div><div class="metric-value num">${zanca.toFixed(2)}<span class="unit">m</span></div></div>
      <div class="metric-cell"><div class="metric-num-mark">04</div><div class="metric-label">Ángulo</div><div class="metric-value num">${angulo.toFixed(1)}<span class="unit">°</span></div></div>
    </div>
  </div>`;
  if (!cumple) triggerShake(zone);
}

function renderHint(st) {
  const { n, b, cumple, warn, bOptimo, maxPerTramo, norma, lHint, nMaxOk } = st;
  const zone = document.getElementById('hint-zone');
  const parts = [];

  if (n === 1) parts.push('Escalón único — no requiere pasamanos según norma.');
  if (!nMaxOk) parts.push(`<b>${maxPerTramo} escalones</b> en el tramo más largo excede el límite de <b>${norma.nMax}</b>. Se requiere descanso adicional.`);
  if (!bOptimo && cumple) parts.push(`Blondel = <b>${b.toFixed(1)} cm</b> está fuera del rango óptimo 63–65 cm, aunque dentro de lo permitido.`);

  let html = '';
  if (lHint) html += `<div class="hint-block"><div class="hint-label">longitud disponible</div>${lHint}</div>`;
  if (parts.length) html += `<div class="hint-block"><div class="hint-label">observaciones</div><div class="hint">${parts.join('<br>')}</div></div>`;
  zone.innerHTML = html;
}

function triggerShake(zone) {
  const el = zone.querySelector('.result-big');
  if (!el) return;
  el.classList.remove('shake');
  void el.offsetWidth;
  el.classList.add('shake');
  setTimeout(() => el.classList.remove('shake'), 400);
}

function animateRampStrokes() {
  document.querySelectorAll('.ramp-seg').forEach(line => {
    const x1 = +line.getAttribute('x1'), y1 = +line.getAttribute('y1');
    const x2 = +line.getAttribute('x2'), y2 = +line.getAttribute('y2');
    const len = Math.hypot(x2 - x1, y2 - y1);
    line.style.strokeDasharray = len;
    line.style.strokeDashoffset = len;
    line.getBoundingClientRect();
    line.style.transition = 'stroke-dashoffset 400ms cubic-bezier(0.16,1,0.3,1)';
    line.style.strokeDashoffset = 0;
  });
}

function getColors() {
  const cs = getComputedStyle(document.documentElement);
  return {
    surface: cs.getPropertyValue('--surface').trim(),
    text:    cs.getPropertyValue('--text').trim(),
    mid:     cs.getPropertyValue('--text-mid').trim(),
    muted:   cs.getPropertyValue('--text-muted').trim(),
    border:  cs.getPropertyValue('--border').trim(),
    warn:    cs.getPropertyValue('--warn').trim(),
    accent:  cs.getPropertyValue('--accent').trim()
  };
}

/* --- SVG helpers --- */

const REF_SCALE = 60; /* px per meter reference — prevents stretch on small stairs */

function svgCorte(st) {
  const { h, a, H, n, L, zanca, angulo, tramosData, cumple } = st;
  const col = getColors();
  const stroke = cumple ? col.accent : col.warn;

  const descansoMin = tramosData.descansoMin;
  const totalL = L + tramosData.nDescansos * descansoMin;

  const padL = 110, padR = 80, padT = 60, padB = 100;
  const maxDrawW = 920 - padL - padR;
  const scaleX = (totalL * REF_SCALE > maxDrawW) ? maxDrawW / totalL : REF_SCALE;
  const scaleY = scaleX; /* real proportions, no exaggeration */

  const usedW = totalL * scaleX;
  const drawH = H * scaleY;
  const W = padL + usedW + padR;
  const totalSVGH = padT + drawH + padB;

  const toX = (x) => padL + x * scaleX;
  const toY = (y) => padT + drawH - y * scaleY;

  const aPm = a / 100; /* a in meters */
  const hPm = h / 100; /* h in meters */

  let parts = [];
  parts.push(`<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>`);

  /* ground reference line */
  parts.push(`<line x1="${padL - 20}" y1="${toY(0)}" x2="${toX(totalL) + 20}" y2="${toY(0)}" stroke="${col.muted}" stroke-width="0.4" stroke-dasharray="2 3"/>`);

  if (n > 20) {
    /* simplified: triangle + label */
    parts.push(`<line class="ramp-seg" x1="${toX(0)}" y1="${toY(0)}" x2="${toX(L)}" y2="${toY(H)}" stroke="${stroke}" stroke-width="1.2" stroke-linecap="round"/>`);
    parts.push(`<text x="${(toX(0) + toX(L)) / 2}" y="${(toY(0) + toY(H)) / 2 - 10}" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" fill="${col.mid}">${n} escalones</text>`);
  } else {
    let cx = 0, cy = 0;
    for (let t = 0; t < tramosData.t; t++) {
      const nT = tramosData.tramos[t];
      for (let i = 0; i < nT; i++) {
        /* riser */
        parts.push(`<line class="ramp-seg" x1="${toX(cx)}" y1="${toY(cy)}" x2="${toX(cx)}" y2="${toY(cy + hPm)}" stroke="${stroke}" stroke-width="0.8" stroke-linecap="round"/>`);
        /* tread */
        parts.push(`<line class="ramp-seg" x1="${toX(cx)}" y1="${toY(cy + hPm)}" x2="${toX(cx + aPm)}" y2="${toY(cy + hPm)}" stroke="${stroke}" stroke-width="0.8" stroke-linecap="round"/>`);
        cx += aPm;
        cy += hPm;
      }
      if (t < tramosData.t - 1) {
        const dx = descansoMin;
        parts.push(`<line x1="${toX(cx)}" y1="${toY(cy)}" x2="${toX(cx + dx)}" y2="${toY(cy)}" stroke="${stroke}" stroke-width="1.4" stroke-linecap="round"/>`);
        parts.push(`<line x1="${toX(cx)}"      y1="${toY(cy) - 4}" x2="${toX(cx)}"      y2="${toY(cy) + 4}" stroke="${stroke}" stroke-width="0.6"/>`);
        parts.push(`<line x1="${toX(cx + dx)}" y1="${toY(cy) - 4}" x2="${toX(cx + dx)}" y2="${toY(cy) + 4}" stroke="${stroke}" stroke-width="0.6"/>`);
        parts.push(`<text x="${(toX(cx) + toX(cx + dx)) / 2}" y="${toY(cy) - 8}" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="${col.mid}">D${t + 1}</text>`);
        cx += dx;
      }
    }
  }

  /* zanca — diagonal of stair section only (no descansos) */
  const zanX1 = toX(0), zanY1 = toY(0), zanX2 = toX(L), zanY2 = toY(H);
  parts.push(`<line x1="${zanX1}" y1="${zanY1}" x2="${zanX2}" y2="${zanY2}" stroke="${col.muted}" stroke-width="0.5" stroke-dasharray="5 4"/>`);
  const zanMx = (zanX1 + zanX2) / 2, zanMy = (zanY1 + zanY2) / 2;
  const zanAng = Math.atan2(zanY2 - zanY1, zanX2 - zanX1) * 180 / Math.PI;
  parts.push(`<text x="${zanMx}" y="${zanMy - 8}" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="10" fill="${col.muted}" transform="rotate(${zanAng},${zanMx},${zanMy})">${zanca.toFixed(2)} m</text>`);

  /* H cota — left side */
  parts.push(`<line x1="${padL - 40}" y1="${toY(0)}" x2="${padL - 40}" y2="${toY(H)}" stroke="${col.muted}" stroke-width="0.5" marker-end="url(#arr)" marker-start="url(#arr)"/>`);
  parts.push(`<text x="${padL - 46}" y="${(toY(0) + toY(H)) / 2 + 4}" text-anchor="end" font-family="JetBrains Mono,monospace" font-size="10" fill="${col.mid}">${H.toFixed(2)} m</text>`);

  /* labels */
  parts.push(`<text x="${toX(0)}"      y="${toY(0) + 22}"  text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" fill="${col.text}">salida</text>`);
  parts.push(`<text x="${toX(totalL)}" y="${toY(H) - 14}"  text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" fill="${col.text}">llegada</text>`);

  /* bottom cota — full length including descansos */
  const yCota = toY(0) + 65;
  parts.push(`<line x1="${toX(0)}" y1="${yCota}" x2="${toX(totalL)}" y2="${yCota}" stroke="${col.muted}" stroke-width="0.5" marker-end="url(#arr)" marker-start="url(#arr)"/>`);
  parts.push(`<text x="${(toX(0) + toX(totalL)) / 2}" y="${yCota + 15}" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="10" fill="${col.mid}">${totalL.toFixed(2)} m</text>`);

  /* angle arc at base */
  const arcR = Math.min(28, usedW * 0.08);
  const angRad = angulo * Math.PI / 180;
  parts.push(`<path d="M ${toX(0) + arcR} ${toY(0)} A ${arcR} ${arcR} 0 0 0 ${toX(0) + arcR * Math.cos(angRad)} ${toY(0) - arcR * Math.sin(angRad)}" fill="none" stroke="${col.muted}" stroke-width="0.6"/>`);
  parts.push(`<text x="${toX(0) + arcR + 10}" y="${toY(0) - 5}" font-family="JetBrains Mono,monospace" font-size="9" fill="${col.muted}">${angulo.toFixed(1)}°</text>`);

  return `<svg width="100%" viewBox="0 0 ${W} ${totalSVGH}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMinYMid meet">${parts.join('\n')}</svg>`;
}

function svgPlanta(st) {
  const { a, n, L, tramosData, cumple, ancho } = st;
  const col = getColors();
  const stroke = cumple ? col.accent : col.warn;

  const descansoMin = tramosData.descansoMin;
  const totalL = L + tramosData.nDescansos * descansoMin;

  const padL = 100, padR = 80, padT = 60, padB = 90;
  const maxDrawW = 920 - padL - padR;
  const scaleX = (totalL * REF_SCALE > maxDrawW) ? maxDrawW / totalL : REF_SCALE;

  const usedW   = totalL * scaleX;
  const anchoPx = Math.max(32, Math.min(140, ancho * scaleX));
  const yTop = padT, yBot = padT + anchoPx, yMid = padT + anchoPx / 2;
  const vbW   = padL + usedW + padR;
  const totalH = padT + anchoPx + padB;

  const toX = (x) => padL + x * scaleX;
  const aPm = a / 100;

  let parts = [];
  parts.push(`<defs><marker id="arr-p" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>`);

  parts.push(`<rect x="${padL}" y="${yTop}" width="${usedW}" height="${anchoPx}" fill="none" stroke="${stroke}" stroke-width="0.8"/>`);

  let cx = 0;
  for (let t = 0; t < tramosData.t; t++) {
    const nT = tramosData.tramos[t];
    for (let i = 0; i < nT; i++) {
      const stepNum = tramosData.tramos.slice(0, t).reduce((s, v) => s + v, 0) + i + 1;
      const xMid = toX(cx + aPm / 2);
      if (n <= 30 || stepNum % 5 === 0 || stepNum === 1 || stepNum === n) {
        const fs = anchoPx < 35 ? 8 : 10;
        parts.push(`<text x="${xMid}" y="${yMid + fs / 3}" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="${fs}" fill="${col.mid}">${stepNum}</text>`);
      }
      cx += aPm;
      if (i < nT - 1) {
        parts.push(`<line x1="${toX(cx)}" y1="${yTop}" x2="${toX(cx)}" y2="${yBot}" stroke="${stroke}" stroke-width="0.4" stroke-opacity="0.5"/>`);
      }
    }
    if (t < tramosData.t - 1) {
      const xD1 = toX(cx), xD2 = toX(cx + descansoMin);
      const hSp = 5;
      for (let xh = xD1; xh < xD2; xh += hSp) {
        parts.push(`<line x1="${xh}" y1="${yTop}" x2="${Math.min(xh + anchoPx * 0.7, xD2)}" y2="${Math.min(yBot, yTop + (xD2 - xh))}" stroke="${stroke}" stroke-width="0.4" stroke-opacity="0.3"/>`);
      }
      parts.push(`<line x1="${xD1}" y1="${yTop}" x2="${xD1}" y2="${yBot}" stroke="${stroke}" stroke-width="0.8"/>`);
      parts.push(`<line x1="${xD2}" y1="${yTop}" x2="${xD2}" y2="${yBot}" stroke="${stroke}" stroke-width="0.8"/>`);
      parts.push(`<text x="${(xD1 + xD2) / 2}" y="${yMid + 4}" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="${col.mid}">D${t + 1}</text>`);
      cx += descansoMin;
    }
  }

  /* labels */
  const arrowY = yTop + anchoPx * 0.4;
  parts.push(`<text x="${padL + 12}" y="${arrowY}" font-family="-apple-system,sans-serif" font-size="10" fill="${stroke}">↑ SUBE</text>`);
  parts.push(`<text x="${toX(0)}"      y="${yTop - 22}" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" fill="${col.text}">salida</text>`);
  parts.push(`<text x="${toX(totalL)}" y="${yTop - 22}" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" fill="${col.text}">llegada</text>`);

  /* bottom cota */
  const yCota = yBot + 52;
  parts.push(`<line x1="${toX(0)}" y1="${yCota}" x2="${toX(totalL)}" y2="${yCota}" stroke="${col.muted}" stroke-width="0.5" marker-end="url(#arr-p)" marker-start="url(#arr-p)"/>`);
  parts.push(`<text x="${(toX(0) + toX(totalL)) / 2}" y="${yCota + 15}" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="10" fill="${col.mid}">${totalL.toFixed(2)} m</text>`);

  /* width cota */
  parts.push(`<line x1="${padL - 28}" y1="${yTop}" x2="${padL - 28}" y2="${yBot}" stroke="${col.muted}" stroke-width="0.5" marker-end="url(#arr-p)" marker-start="url(#arr-p)"/>`);
  parts.push(`<text x="${padL - 34}" y="${yMid + 4}" text-anchor="end" font-family="JetBrains Mono,monospace" font-size="10" fill="${col.mid}">${ancho.toFixed(2)} m</text>`);

  return `<svg width="100%" viewBox="0 0 ${vbW} ${totalH}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMinYMid meet">${parts.join('\n')}</svg>`;
}

function svgDetalle(st) {
  const { h, a } = st;
  const col = getColors();
  const norma = getNorma();
  const b = blondel(h, a);
  const bOk     = b >= 63 && b <= 65;
  const bInNorma = b >= norma.bMin && b <= norma.bMax;
  const bColor   = bOk ? col.text : bInNorma ? col.mid : col.warn;
  const bLabel   = bOk ? '✓ óptimo' : bInNorma ? 'cumple norma' : '✗ fuera norma';

  const nSteps  = 3;
  const targetW = 320, targetH = 240;
  const sX = targetW / (nSteps * a);
  const sY = targetH / (nSteps * h);
  const scale = Math.min(sX, sY, 6);

  const aPx = a * scale, hPx = h * scale;
  const drawW = nSteps * aPx, drawH = nSteps * hPx;
  const noseSize = Math.min(3, scale * 0.5);

  const padL = 100, padT = 60, padR = 120, padB = 60;
  const totalW = padL + drawW + padR;
  const totalH = padT + drawH + padB;
  const ox = padL, oy = padT + drawH;

  let parts = [];
  parts.push(`<defs><marker id="arr-d" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>`);

  /* steps */
  let px = ox, py = oy;
  for (let i = 0; i < nSteps; i++) {
    parts.push(`<line x1="${px}" y1="${py}" x2="${px}" y2="${py - hPx}" stroke="${col.accent}" stroke-width="1.0" stroke-linecap="round"/>`);
    parts.push(`<line x1="${px}" y1="${py - hPx}" x2="${px + aPx}" y2="${py - hPx}" stroke="${col.accent}" stroke-width="1.0" stroke-linecap="round"/>`);
    /* nose */
    parts.push(`<line x1="${px + aPx - noseSize}" y1="${py - hPx}" x2="${px + aPx}" y2="${py - hPx + noseSize * 1.5}" stroke="${col.accent}" stroke-width="0.8" stroke-linecap="square"/>`);
    px += aPx;
    py -= hPx;
  }

  /* ground line */
  parts.push(`<line x1="${ox}" y1="${oy}" x2="${ox + drawW}" y2="${oy}" stroke="${col.muted}" stroke-width="0.4" stroke-dasharray="2 3"/>`);

  /* h cota */
  parts.push(`<line x1="${ox - 14}" y1="${oy}" x2="${ox - 14}" y2="${oy - hPx}" stroke="${col.muted}" stroke-width="0.5" marker-end="url(#arr-d)" marker-start="url(#arr-d)"/>`);
  parts.push(`<text x="${ox - 20}" y="${oy - hPx / 2 + 4}" text-anchor="end" font-family="JetBrains Mono,monospace" font-size="10" fill="${col.mid}">h = ${h.toFixed(1)} cm</text>`);

  /* a cota */
  parts.push(`<line x1="${ox}" y1="${oy + 18}" x2="${ox + aPx}" y2="${oy + 18}" stroke="${col.muted}" stroke-width="0.5" marker-end="url(#arr-d)" marker-start="url(#arr-d)"/>`);
  parts.push(`<text x="${ox + aPx / 2}" y="${oy + 32}" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="10" fill="${col.mid}">a = ${a.toFixed(1)} cm</text>`);

  /* Blondel annotation — 3 lines, right side, vertically centered */
  const bx = ox + drawW + 16;
  const by = padT + drawH / 2 - 22;
  parts.push(`<text x="${bx}" y="${by}"      text-anchor="start" font-family="JetBrains Mono,monospace" font-size="9"  fill="${col.muted}" letter-spacing="0.08em">blondel</text>`);
  parts.push(`<text x="${bx}" y="${by + 16}" text-anchor="start" font-family="JetBrains Mono,monospace" font-size="13" fill="${bColor}">2h+a = ${b.toFixed(1)} cm</text>`);
  parts.push(`<text x="${bx}" y="${by + 30}" text-anchor="start" font-family="JetBrains Mono,monospace" font-size="9"  fill="${bColor}">${bLabel}</text>`);

  return `<svg width="100%" viewBox="0 0 ${totalW} ${totalH}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMinYMid meet">${parts.join('\n')}</svg>`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function exportSVG(containerId, filename) {
  const container = document.getElementById(containerId);
  const svg = container.querySelector('svg');
  if (!svg) { showToast('No hay diagrama para exportar'); return; }
  const col = getColors();
  const scale = 3;
  const clone = svg.cloneNode(true);
  const vb = svg.viewBox.baseVal;
  const w = vb.width, h = vb.height;
  clone.setAttribute('width', w);
  clone.setAttribute('height', h);
  clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  const svgString = new XMLSerializer().serializeToString(clone);
  const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(svgBlob);
  document.fonts.ready.then(() => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = w * scale;
      canvas.height = h * scale;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = col.surface;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.scale(scale, scale);
      ctx.drawImage(img, 0, 0);
      URL.revokeObjectURL(url);
      canvas.toBlob(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${filename}-${new Date().toISOString().slice(0, 10)}.png`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(a.href);
        showToast('Imagen exportada');
      }, 'image/png');
    };
    img.onerror = () => { URL.revokeObjectURL(url); showToast('Error al exportar'); };
    img.src = url;
  });
}

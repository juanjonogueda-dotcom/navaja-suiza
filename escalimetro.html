<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escalímetro</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #000000;
    --border:       rgba(255,255,255,0.12);
    --border-focus: rgba(255,255,255,0.45);
    --text:         #ffffff;
    --text-mid:     rgba(255,255,255,0.55);
    --text-muted:   rgba(255,255,255,0.28);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100svh;
    max-width: 520px;
    margin: 0 auto;
    padding: 18px 22px 22px;
    gap: 14px;
  }

  /* ── título ── */
  .title-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .back-link {
    font-size: 1rem;
    color: var(--text-muted);
    text-decoration: none;
    line-height: 1;
    transition: color 0.15s;
  }
  .back-link:hover { color: var(--text); }
  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: lowercase;
  }

  /* ── input grande ── */
  .input-big {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(38px, 11vw, 60px);
    font-weight: 400;
    color: var(--text);
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    outline: none;
    width: 100%;
    padding: 0 0 6px;
    letter-spacing: -0.03em;
    line-height: 1;
    flex-shrink: 0;
    -moz-appearance: textfield;
  }
  .input-big::-webkit-inner-spin-button,
  .input-big::-webkit-outer-spin-button { display: none; }
  .input-big:focus { border-bottom-color: var(--border-focus); }

  /* ── segmented control ── */
  .seg {
    display: grid;
    border: 1px solid var(--border);
    border-radius: 7px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .seg-5 { grid-template-columns: repeat(5, 1fr); }
  .seg-3 { grid-template-columns: repeat(3, 1fr); }

  .seg button {
    background: none;
    border: none;
    border-right: 1px solid var(--border);
    padding: 0 4px;
    height: 40px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    transition: color 0.15s;
    text-align: center;
  }
  .seg button:last-child { border-right: none; }
  .seg button.active {
    color: var(--text);
    box-shadow: inset 0 -2px 0 0 var(--text);
    font-weight: 500;
  }
  .seg button:hover:not(.active) { color: var(--text-mid); }

  /* ── escala ── */
  .scale-block { flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; }
  .scale-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    margin-bottom: 2px;
  }
  .scale-row { display: flex; align-items: baseline; gap: 6px; }
  .scale-prefix {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.15rem;
    color: var(--text-muted);
    white-space: nowrap;
    line-height: 1;
  }
  .scale-input {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.15rem;
    color: var(--text);
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    outline: none;
    width: 90px;
    padding: 2px 0 4px;
    -moz-appearance: textfield;
  }
  .scale-input::-webkit-inner-spin-button,
  .scale-input::-webkit-outer-spin-button { display: none; }
  .scale-input:focus { border-bottom-color: var(--border-focus); }

  /* ── resultado ── */
  .result-wrap {
    flex: 1;
    min-height: 0;
    display: flex;
    align-items: flex-start;
    cursor: pointer;
    user-select: none;
    overflow: hidden;
  }
  .result-wrap:active { opacity: 0.55; }

  .result-big {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(52px, 15vw, 96px);
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.04em;
    line-height: 0.88;
    font-feature-settings: 'tnum' 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }

  /* ── toast ── */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: var(--text);
    color: var(--bg);
    padding: 9px 20px;
    border-radius: 100px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s, transform 0.22s;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="app">

  <div class="title-row">
    <a class="back-link" href="index.html">←</a>
    <h1>escalímetro</h1>
  </div>

  <input type="number" class="input-big" id="inputValue" value="0.90" step="any" placeholder="0">

  <div class="seg seg-5" id="input-unit-control">
    <button data-val="km">km</button>
    <button class="active" data-val="m">m</button>
    <button data-val="cm">cm</button>
    <button data-val="mm">mm</button>
    <button data-val="in">in</button>
  </div>

  <div class="scale-block">
    <span class="scale-label">escala</span>
    <div class="scale-row">
      <span class="scale-prefix">1 :</span>
      <input type="number" class="scale-input" id="scaleFactor" value="100" placeholder="100">
    </div>
    <div class="seg seg-3" id="presets">
      <button data-val="50">1:50</button>
      <button class="active" data-val="100">1:100</button>
      <button data-val="200">1:200</button>
    </div>
  </div>

  <div class="seg seg-5" id="output-unit-control">
    <button data-val="km">km</button>
    <button data-val="m">m</button>
    <button data-val="cm">cm</button>
    <button class="active" data-val="mm">mm</button>
    <button data-val="in">in</button>
  </div>

  <div class="result-wrap" id="copyTrigger">
    <span class="result-big" id="resultValue">9.000</span>
  </div>

</div>

<div class="toast" id="toast">copiado</div>

<script>
  const toM   = { km:1000, m:1, cm:0.01, mm:0.001, in:0.0254 };
  const fromM = { km:0.001, m:1, cm:100, mm:1000, in:39.3701 };
  let inputUnit  = 'm';
  let outputUnit = 'mm';

  function calc() {
    const v = parseFloat(document.getElementById('inputValue').value) || 0;
    const s = parseFloat(document.getElementById('scaleFactor').value) || 1;
    if (s <= 0) return;
    const result = (v * toM[inputUnit] / s) * fromM[outputUnit];
    document.getElementById('resultValue').textContent = result.toFixed(3);
  }

  function setPreset(v) {
    document.getElementById('scaleFactor').value = v;
    document.querySelectorAll('#presets button').forEach(b =>
      b.classList.toggle('active', b.dataset.val == v));
    calc();
  }

  document.querySelectorAll('#presets button').forEach(btn =>
    btn.addEventListener('click', () => setPreset(btn.dataset.val)));

  document.getElementById('scaleFactor').addEventListener('input', () => {
    document.querySelectorAll('#presets button').forEach(b => b.classList.remove('active'));
    calc();
  });

  document.getElementById('inputValue').addEventListener('input', calc);

  document.querySelectorAll('#input-unit-control button').forEach(btn =>
    btn.addEventListener('click', () => {
      document.querySelectorAll('#input-unit-control button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      inputUnit = btn.dataset.val;
      calc();
    }));

  document.querySelectorAll('#output-unit-control button').forEach(btn =>
    btn.addEventListener('click', () => {
      document.querySelectorAll('#output-unit-control button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      outputUnit = btn.dataset.val;
      calc();
    }));

  document.getElementById('copyTrigger').addEventListener('click', () => {
    const txt = document.getElementById('resultValue').textContent;
    navigator.clipboard.writeText(txt).catch(() => {
      const ta = Object.assign(document.createElement('textarea'),
        { value: txt, style: 'position:fixed;left:-9999px' });
      document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    });
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1400);
  });

  calc();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escalímetro — Navaja Suiza</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #000000;
    --surface:      #0d0d0d;
    --border:       rgba(255,255,255,0.1);
    --border-hover: rgba(255,255,255,0.25);
    --text:         #ffffff;
    --text-mid:     rgba(255,255,255,0.6);
    --text-muted:   rgba(255,255,255,0.3);
    --accent:       #ffffff;
    --warn:         #ff6b6b;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .page {
    display: grid;
    grid-template-rows: auto 1fr;
    height: 100vh;
    padding: clamp(20px, 2.5vh, 36px) clamp(24px, 4vw, 56px) 0;
    gap: 0;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    padding-bottom: clamp(14px, 1.8vh, 22px);
    border-bottom: 1px solid var(--border);
    margin-bottom: clamp(14px, 1.8vh, 22px);
    flex-shrink: 0;
  }

  .back-link {
    font-size: clamp(36px, 5vw, 64px);
    font-weight: 800;
    color: var(--text-muted);
    text-decoration: none;
    letter-spacing: -0.04em;
    line-height: 0.9;
    transition: color 0.15s;
  }
  .back-link:hover { color: var(--text); }

  h1 {
    font-size: clamp(36px, 5vw, 64px);
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 0.9;
  }

  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: clamp(24px, 4vw, 56px);
    min-height: 0;
    overflow: hidden;
  }

  .sidebar {
    overflow-y: auto;
    padding-right: 8px;
    padding-bottom: 48px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .main-area {
    overflow-y: auto;
    padding-bottom: 56px;
    min-height: 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .main-area::-webkit-scrollbar { width: 4px; }
  .main-area::-webkit-scrollbar-track { background: transparent; }
  .main-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .section-head {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: lowercase;
    margin-bottom: 16px;
  }
  .section-head .num-mark { color: var(--text-muted); margin-right: 8px; }

  .toggle-block { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }

  .seg-control {
    display: grid;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    width: 100%;
  }
  .seg-control.cols-5 { grid-template-columns: repeat(5, 1fr); }
  .seg-control.cols-3 { grid-template-columns: repeat(3, 1fr); }
  .seg-control.cols-2 { grid-template-columns: repeat(2, 1fr); }
  .seg-control button {
    background: none;
    border: none;
    border-right: 1px solid var(--border);
    padding: 9px 4px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(11px, 2vw, 13px);
    cursor: pointer;
    transition: color 0.15s;
    text-align: center;
    line-height: 1.2;
    min-height: 36px;
  }
  .seg-control button:last-child { border-right: none; }
  .seg-control button.active {
    background: transparent;
    color: var(--text);
    box-shadow: inset 0 -2px 0 0 var(--text);
    font-weight: 500;
  }
  .seg-control button:hover:not(.active) { color: var(--text-mid); }

  /* row divider for 2-row presets grid */
  .seg-control.cols-3 > button:nth-child(-n+3) {
    border-bottom: 1px solid var(--border);
  }

  /* Scale input */
  .scale-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 12px;
  }
  .scale-prefix {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem;
    color: var(--text-muted);
    white-space: nowrap;
    line-height: 1;
    flex-shrink: 0;
  }
  .scale-input {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem;
    color: var(--text);
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    outline: none;
    flex: 1;
    min-width: 0;
    padding: 2px 0 4px;
    -moz-appearance: textfield;
    transition: border-color 0.15s;
  }
  .scale-input::-webkit-inner-spin-button,
  .scale-input::-webkit-outer-spin-button { display: none; }
  .scale-input:focus { border-bottom-color: var(--text); }

  /* Entrada input */
  .entrada-input {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem;
    color: var(--text);
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    outline: none;
    width: 100%;
    padding: 2px 0 4px;
    -moz-appearance: textfield;
    transition: border-color 0.15s;
  }
  .entrada-input::-webkit-inner-spin-button,
  .entrada-input::-webkit-outer-spin-button { display: none; }
  .entrada-input:focus { border-bottom-color: var(--text); }

  /* Result */
  .result-block { margin-bottom: 32px; }
  .result-value-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 12px;
    cursor: pointer;
    user-select: none;
  }
  .result-value-row:active { opacity: 0.55; }
  .result-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.4rem;
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.02em;
    font-feature-settings: 'tnum' 1;
  }
  .result-unit-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }

  /* Ruler proportion */
  .ruler-wrap { display: flex; flex-direction: column; gap: 28px; }
  .ruler-wrap.hidden { visibility: hidden; }

  .ruler-row { display: flex; flex-direction: column; gap: 7px; }

  .ruler-label-top {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: lowercase;
  }

  .ruler-bar-area {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .ruler-bar-wrap {
    flex: 1;
    min-width: 0;
    position: relative;
    height: 10px;
    display: flex;
    align-items: center;
  }

  .ruler-bar {
    height: 1.5px;
    position: relative;
    transition: width 300ms ease;
    min-width: 0;
  }

  .ruler-bar::before,
  .ruler-bar::after {
    content: '';
    position: absolute;
    width: 1.5px;
    height: 10px;
    top: -4px;
    background: currentColor;
  }
  .ruler-bar::before { left: 0; }
  .ruler-bar::after  { right: 0; }

  .ruler-row--papel .ruler-bar {
    color: var(--text-mid);
    background: var(--text-mid);
  }
  .ruler-row--real .ruler-bar {
    color: var(--text);
    background: var(--text);
  }

  .ruler-ticks {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .ruler-tick {
    position: absolute;
    width: 1px;
    height: 5px;
    top: -2px;
    background: currentColor;
    opacity: 0.35;
  }

  .ruler-label-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.73rem;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .ruler-row--papel .ruler-label-value { color: var(--text-mid); }
  .ruler-row--real  .ruler-label-value { color: var(--text); }

  @media (max-width: 480px) {
    .ruler-bar-area { flex-direction: column; align-items: flex-start; gap: 4px; }
    .ruler-bar-wrap { width: 100%; }
    .ruler-label-value { padding-left: 0; }
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: var(--bg);
    padding: 10px 20px;
    border-radius: 100px;
    font-size: 0.82rem;
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 760px) {
    html, body { overflow: auto; }
    .page { height: auto; overflow: visible; padding: 24px 20px 0; }
    .layout { grid-template-columns: 1fr; overflow: visible; }
    .sidebar { overflow: visible; padding-right: 0; padding-bottom: 0; }
    .main-area { overflow: visible; padding-bottom: 56px; }
    .seg-control button { min-height: 44px; }
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <a class="back-link" href="index.html">←</a>
    <h1>escalímetro</h1>
  </header>

  <div class="layout">
    <aside class="sidebar">

      <div class="section-head"><span class="num-mark">01</span>dirección</div>
      <div class="toggle-block">
        <div class="seg-control cols-2" id="dir-control">
          <button class="active" data-val="realPaper">Real → Papel</button>
          <button data-val="paperReal">Papel → Real</button>
        </div>
      </div>

      <div class="section-head"><span class="num-mark">02</span>escala</div>
      <div class="toggle-block">
        <div class="scale-row">
          <span class="scale-prefix">1 :</span>
          <input type="number" class="scale-input" id="scaleFactor" value="100" placeholder="100" min="1">
        </div>
        <div class="seg-control cols-3" id="presets">
          <button data-val="50">1:50</button>
          <button class="active" data-val="100">1:100</button>
          <button data-val="200">1:200</button>
          <button data-val="250">1:250</button>
          <button data-val="500">1:500</button>
          <button data-val="1000">1:1000</button>
        </div>
      </div>

      <div class="section-head"><span class="num-mark">03</span>entrada</div>
      <div class="toggle-block">
        <input type="number" class="entrada-input" id="inputValue" value="1" step="any" placeholder="0">
        <div class="seg-control cols-5" id="input-unit-control">
          <button data-val="km">km</button>
          <button class="active" data-val="m">m</button>
          <button data-val="cm">cm</button>
          <button data-val="mm">mm</button>
          <button data-val="in">in</button>
        </div>
      </div>

    </aside>

    <div class="main-area">

      <div class="section-head"><span class="num-mark">04</span>resultado</div>
      <div class="result-block">
        <div class="result-value-row" id="copyTrigger" title="Clic para copiar">
          <span class="result-number" id="resultValue">—</span>
          <span class="result-unit-label" id="resultUnit">mm</span>
        </div>
        <div class="seg-control cols-5" id="output-unit-control">
          <button data-val="km">km</button>
          <button data-val="m">m</button>
          <button data-val="cm">cm</button>
          <button class="active" data-val="mm">mm</button>
          <button data-val="in">in</button>
        </div>
      </div>

      <div class="section-head" style="margin-top:32px"><span class="num-mark">05</span>proporción</div>
      <div class="ruler-wrap hidden" id="rulerWrap">
        <div class="ruler-row ruler-row--papel" id="rulerRow1">
          <div class="ruler-label-top" id="rulerDesc1">papel</div>
          <div class="ruler-bar-area">
            <div class="ruler-bar-wrap">
              <div class="ruler-bar" id="rulerBar1" style="width:100%">
                <div class="ruler-ticks" id="rulerTicks1"></div>
              </div>
            </div>
            <div class="ruler-label-value" id="rulerLabel1">—</div>
          </div>
        </div>
        <div class="ruler-row ruler-row--real" id="rulerRow2">
          <div class="ruler-label-top" id="rulerDesc2">real</div>
          <div class="ruler-bar-area">
            <div class="ruler-bar-wrap">
              <div class="ruler-bar" id="rulerBar2" style="width:100%">
                <div class="ruler-ticks" id="rulerTicks2"></div>
              </div>
            </div>
            <div class="ruler-label-value" id="rulerLabel2">—</div>
          </div>
        </div>
      </div>

    </div>
  </div>

</div>

<div class="toast" id="toast">copiado</div>

<script>
  const toM   = { km:1000, m:1, cm:0.01, mm:0.001, in:0.0254 };
  const fromM = { km:0.001, m:1, cm:100, mm:1000, in:39.3701 };

  let direction  = 'realPaper';
  let inputUnit  = 'm';
  let outputUnit = 'mm';

  function calc() {
    const v = parseFloat(document.getElementById('inputValue').value);
    const s = parseFloat(document.getElementById('scaleFactor').value) || 1;
    const resultEl = document.getElementById('resultValue');
    const unitEl   = document.getElementById('resultUnit');

    if (isNaN(v) || s <= 0) {
      resultEl.textContent = '—';
      document.getElementById('rulerWrap').classList.add('hidden');
      return;
    }

    let result;
    if (direction === 'realPaper') {
      result = (v * toM[inputUnit] / s) * fromM[outputUnit];
    } else {
      result = (v * toM[inputUnit] * s) * fromM[outputUnit];
    }

    resultEl.textContent = formatResult(result);
    unitEl.textContent   = outputUnit;

    renderProportion(v, inputUnit, result, outputUnit, s);
    saveState();
  }

  function formatResult(val) {
    if (val === 0) return '0';
    const abs = Math.abs(val);
    if (abs >= 10000) return val.toFixed(0);
    if (abs >= 1000)  return val.toFixed(1);
    if (abs >= 100)   return val.toFixed(2);
    if (abs >= 10)    return val.toFixed(3);
    if (abs >= 1)     return val.toFixed(4);
    if (abs >= 0.01)  return val.toFixed(5);
    return val.toPrecision(4);
  }

  function setTicks(containerId, count) {
    const el = document.getElementById(containerId);
    el.innerHTML = '';
    for (let i = 1; i <= count; i++) {
      const d = document.createElement('div');
      d.className = 'ruler-tick';
      d.style.left = (i / (count + 1) * 100) + '%';
      el.appendChild(d);
    }
  }

  function renderProportion(inputVal, inUnit, outputVal, outUnit, scale) {
    let paperVal, paperUnit, realVal, realUnit;
    if (direction === 'realPaper') {
      realVal  = inputVal;  realUnit  = inUnit;
      paperVal = outputVal; paperUnit = outUnit;
    } else {
      paperVal = inputVal;  paperUnit = inUnit;
      realVal  = outputVal; realUnit  = outUnit;
    }

    const realInM  = realVal  * toM[realUnit];
    const paperInM = paperVal * toM[paperUnit];

    let paperPct, realPct;
    if (realInM >= paperInM) {
      realPct  = 100;
      paperPct = realInM > 0 ? Math.max(2, (paperInM / realInM) * 100) : 100;
    } else {
      paperPct = 100;
      realPct  = paperInM > 0 ? Math.max(2, (realInM / paperInM) * 100) : 100;
    }

    document.getElementById('rulerBar1').style.width   = paperPct + '%';
    document.getElementById('rulerBar2').style.width   = realPct  + '%';
    document.getElementById('rulerLabel1').textContent = formatResult(paperVal) + ' ' + paperUnit;
    document.getElementById('rulerLabel2').textContent = formatResult(realVal)  + ' ' + realUnit;

    setTicks('rulerTicks1', paperPct === 100 ? 9 : 0);
    setTicks('rulerTicks2', realPct  === 100 ? 9 : 0);

    document.getElementById('rulerWrap').classList.remove('hidden');
  }
  function initSegControl(selector, onChange) {
    const btns = document.querySelectorAll(selector);
    btns.forEach(btn => {
      btn.addEventListener('click', () => {
        btns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        onChange(btn.dataset.val);
      });
    });
  }

  initSegControl('#dir-control button', v => { direction = v; calc(); });
  initSegControl('#input-unit-control button', v => { inputUnit = v; calc(); });
  initSegControl('#output-unit-control button', v => { outputUnit = v; calc(); });

  document.querySelectorAll('#presets button').forEach(btn =>
    btn.addEventListener('click', () => {
      document.getElementById('scaleFactor').value = btn.dataset.val;
      document.querySelectorAll('#presets button').forEach(b =>
        b.classList.toggle('active', b.dataset.val === btn.dataset.val));
      calc();
    }));

  document.getElementById('scaleFactor').addEventListener('input', () => {
    const v = document.getElementById('scaleFactor').value;
    document.querySelectorAll('#presets button').forEach(b =>
      b.classList.toggle('active', b.dataset.val == v));
    calc();
  });

  document.getElementById('inputValue').addEventListener('input', calc);

  document.getElementById('copyTrigger').addEventListener('click', () => {
    const txt = document.getElementById('resultValue').textContent;
    if (txt === '—') return;
    navigator.clipboard.writeText(txt).catch(() => {
      const ta = Object.assign(document.createElement('textarea'),
        { value: txt, style: 'position:fixed;left:-9999px' });
      document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    });
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1400);
  });

  function saveState() {
    try {
      localStorage.setItem('escalimetro_direction',  direction);
      localStorage.setItem('escalimetro_inputUnit',  inputUnit);
      localStorage.setItem('escalimetro_outputUnit', outputUnit);
      localStorage.setItem('escalimetro_scale',      document.getElementById('scaleFactor').value);
      localStorage.setItem('escalimetro_value',      document.getElementById('inputValue').value);
    } catch(e) {}
  }

  function loadState() {
    try {
      const sDir   = localStorage.getItem('escalimetro_direction');
      const sIU    = localStorage.getItem('escalimetro_inputUnit');
      const sOU    = localStorage.getItem('escalimetro_outputUnit');
      const sScale = localStorage.getItem('escalimetro_scale');
      const sVal   = localStorage.getItem('escalimetro_value');
      if (sDir) {
        direction = sDir;
        document.querySelectorAll('#dir-control button').forEach(b =>
          b.classList.toggle('active', b.dataset.val === sDir));
      }
      if (sIU) {
        inputUnit = sIU;
        document.querySelectorAll('#input-unit-control button').forEach(b =>
          b.classList.toggle('active', b.dataset.val === sIU));
      }
      if (sOU) {
        outputUnit = sOU;
        document.querySelectorAll('#output-unit-control button').forEach(b =>
          b.classList.toggle('active', b.dataset.val === sOU));
      }
      if (sScale) {
        document.getElementById('scaleFactor').value = sScale;
        document.querySelectorAll('#presets button').forEach(b =>
          b.classList.toggle('active', b.dataset.val == sScale));
      }
      if (sVal) document.getElementById('inputValue').value = sVal;
    } catch(e) {}
    calc();
  }

  loadState();
</script>
</body>
</html>

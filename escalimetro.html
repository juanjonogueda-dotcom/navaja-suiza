<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escalímetro — Navaja Suiza</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #000000;
    --surface:      #0d0d0d;
    --border:       rgba(255,255,255,0.1);
    --border-hover: rgba(255,255,255,0.25);
    --text:         #ffffff;
    --text-mid:     rgba(255,255,255,0.6);
    --text-muted:   rgba(255,255,255,0.3);
    --accent:       #ffffff;
    --warn:         #ff6b6b;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .page {
    display: grid;
    grid-template-rows: auto 1fr;
    height: 100vh;
    padding: clamp(20px, 2.5vh, 36px) clamp(24px, 4vw, 56px);
    gap: 0;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    padding-bottom: clamp(14px, 1.8vh, 24px);
    border-bottom: 1px solid var(--border);
    margin-bottom: clamp(14px, 1.8vh, 24px);
    flex-shrink: 0;
  }

  .back-link {
    font-size: clamp(36px, 5vw, 64px);
    font-weight: 800;
    color: var(--text-muted);
    text-decoration: none;
    letter-spacing: -0.04em;
    line-height: 0.9;
    transition: color 0.15s;
  }
  .back-link:hover { color: var(--text); }

  h1 {
    font-size: clamp(36px, 5vw, 64px);
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 0.9;
    color: var(--text);
  }

  .content {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: clamp(24px, 4vw, 56px);
    min-height: 0;
    overflow: hidden;
  }

  .sidebar {
    overflow-y: auto;
    padding-right: 8px;
    padding-bottom: 48px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .main-area {
    overflow-y: auto;
    padding-bottom: 56px;
    min-height: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }

  .section-head {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: lowercase;
    margin-bottom: clamp(12px, 1.6vh, 20px);
  }

  .num-mark { color: var(--text-muted); margin-right: 8px; }

  .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: clamp(16px, 2vh, 26px); }
  .field-label { font-size: 0.88rem; color: var(--text-mid); font-weight: 500; }

  .field-input {
    font-family: 'JetBrains Mono', monospace;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-size: clamp(22px, 2.5vw, 28px);
    font-weight: 400;
    padding: 4px 0;
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
    -moz-appearance: textfield;
  }
  .field-input::-webkit-inner-spin-button,
  .field-input::-webkit-outer-spin-button { display: none; }
  .field-input:focus { border-bottom-color: var(--text); }

  .field-unit {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    margin-top: 2px;
  }

  .scale-row { display: flex; align-items: flex-end; gap: 6px; }
  .scale-prefix {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(22px, 2.5vw, 28px);
    font-weight: 400;
    color: var(--text-muted);
    padding: 4px 0;
    line-height: 1;
    white-space: nowrap;
  }
  .scale-row .field-input { flex: 1; }

  .toggle-block { display: flex; flex-direction: column; gap: 8px; margin-bottom: clamp(16px, 2vh, 26px); }
  .toggle-label { font-size: 0.88rem; color: var(--text-mid); font-weight: 500; }

  .formula-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .seg-control {
    display: grid;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    width: 100%;
  }
  .seg-control.cols-6 { grid-template-columns: repeat(6, 1fr); }
  .seg-control.cols-5 { grid-template-columns: repeat(5, 1fr); }
  .seg-control.cols-2 { grid-template-columns: repeat(2, 1fr); }
  .seg-control button {
    background: none;
    border: none;
    border-right: 1px solid var(--border);
    padding: 9px 4px;
    color: var(--text-muted);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: clamp(11px, 2vw, 13px);
    cursor: pointer;
    transition: color 0.15s;
    text-align: center;
    line-height: 1.2;
    min-height: 36px;
  }
  .seg-control button:last-child { border-right: none; }
  .seg-control button.active {
    background: transparent;
    color: var(--text);
    box-shadow: inset 0 -2px 0 0 var(--text);
    font-weight: 500;
  }
  .seg-control button:hover:not(.active) { color: var(--text-mid); }

  .result-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: lowercase;
    margin-bottom: clamp(10px, 1.4vh, 18px);
  }

  .result-number-wrap {
    cursor: pointer;
    user-select: none;
    display: inline-flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: clamp(16px, 2vh, 28px);
  }
  .result-number-wrap:active { opacity: 0.7; }

  .result-big {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(72px, 11vw, 160px);
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.04em;
    line-height: 0.9;
    font-feature-settings: 'tnum' 1;
  }

  .result-copy-hint {
    font-size: 0.8rem;
    color: var(--text-muted);
    opacity: 0.7;
  }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: var(--bg);
    padding: 10px 20px;
    border-radius: 100px;
    font-size: 0.82rem;
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 860px) {
    html, body { overflow: auto; }
    .page { height: auto; overflow: visible; padding: 24px 20px 56px; }
    .content { grid-template-columns: 1fr; overflow: visible; }
    .sidebar, .main-area { overflow: visible; padding-right: 0; padding-bottom: 0; }
    .seg-control.cols-6 { grid-template-columns: repeat(3, 1fr); }
    .seg-control button { min-height: 44px; }
    .result-big { font-size: clamp(64px, 18vw, 120px); }
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <a class="back-link" href="index.html">←</a>
    <h1>Escalímetro</h1>
  </header>

  <div class="content">

    <aside class="sidebar">
      <div class="section-head"><span class="num-mark">01</span>dirección</div>
      <div class="toggle-block">
        <span class="toggle-label">Conversión</span>
        <div class="seg-control cols-2" id="mode-control">
          <button class="active" data-val="to-paper">Real → Papel</button>
          <button data-val="to-real">Papel → Real</button>
        </div>
        <div class="formula-display" id="formulaDisplay">real ÷ escala = papel</div>
      </div>

      <div class="section-head"><span class="num-mark">02</span>escala</div>
      <div class="field">
        <span class="field-label">Factor</span>
        <div class="scale-row">
          <span class="scale-prefix">1 :</span>
          <input type="number" class="field-input" id="scaleFactor" value="250" placeholder="250">
        </div>
      </div>
      <div class="seg-control cols-6" id="presets">
        <button data-val="20">1:20</button>
        <button data-val="50">1:50</button>
        <button data-val="100">1:100</button>
        <button class="active" data-val="250">1:250</button>
        <button data-val="500">1:500</button>
        <button data-val="1000">1:1000</button>
      </div>

      <div class="section-head" style="margin-top:clamp(20px, 2.5vh, 32px)"><span class="num-mark">03</span>medida de entrada</div>
      <div class="field">
        <span class="field-label" id="inputLabel">Medida real</span>
        <input type="number" class="field-input" id="inputValue" value="0.90" step="any" placeholder="0">
        <span class="field-unit" id="inputUnitLabel">metros</span>
      </div>
      <div class="toggle-block">
        <span class="toggle-label">Unidad de entrada</span>
        <div class="seg-control cols-5" id="input-unit-control">
          <button data-val="km">km</button>
          <button class="active" data-val="m">m</button>
          <button data-val="cm">cm</button>
          <button data-val="mm">mm</button>
          <button data-val="in">in</button>
        </div>
      </div>
    </aside>

    <div class="main-area">
      <div class="section-head"><span class="num-mark">04</span>resultado</div>
      <div class="result-tag" id="outputLabel">en papel</div>
      <div class="result-number-wrap" id="copyTrigger">
        <span class="result-big" id="resultValue">3.600</span>
        <span class="result-copy-hint">copiar</span>
      </div>
      <div class="toggle-block" style="margin-bottom:0; max-width: 480px">
        <span class="toggle-label">Unidad de resultado</span>
        <div class="seg-control cols-5" id="output-unit-control">
          <button data-val="km">km</button>
          <button data-val="m">m</button>
          <button data-val="cm">cm</button>
          <button class="active" data-val="mm">mm</button>
          <button data-val="in">in</button>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast">copiado</div>

<script>
  const toM   = { km:1000, m:1, cm:0.01, mm:0.001, in:0.0254 };
  const fromM = { km:0.001, m:1, cm:100, mm:1000, in:39.3701 };
  const unitNames = { km:'kilómetros', m:'metros', cm:'centímetros', mm:'milímetros', in:'pulgadas' };
  let mode = 'to-paper';
  let inputUnit = 'm';
  let outputUnit = 'mm';

  function calc() {
    const v = parseFloat(document.getElementById('inputValue').value) || 0;
    const s = parseFloat(document.getElementById('scaleFactor').value) || 1;
    if (s <= 0) return;
    const inM = v * toM[inputUnit];
    const result = (mode === 'to-paper' ? inM / s : inM * s) * fromM[outputUnit];
    document.getElementById('resultValue').textContent = result.toFixed(3);
    document.getElementById('inputUnitLabel').textContent = unitNames[inputUnit];
  }

  function setMode(m) {
    mode = m;
    document.querySelectorAll('#mode-control button').forEach(b => b.classList.toggle('active', b.dataset.val === m));
    const toPaper = m === 'to-paper';
    document.getElementById('inputLabel').textContent  = toPaper ? 'Medida real' : 'Medida en dibujo';
    document.getElementById('outputLabel').textContent = toPaper ? 'en papel' : 'medida real';
    document.getElementById('formulaDisplay').textContent = toPaper
      ? 'real ÷ escala = papel'
      : 'papel × escala = real';
    calc();
  }

  function setPreset(v) {
    document.getElementById('scaleFactor').value = v;
    document.querySelectorAll('#presets button').forEach(b => {
      b.classList.toggle('active', b.dataset.val == v);
    });
    calc();
  }

  document.querySelectorAll('#mode-control button').forEach(btn =>
    btn.addEventListener('click', () => setMode(btn.dataset.val)));

  document.querySelectorAll('#presets button').forEach(btn =>
    btn.addEventListener('click', () => setPreset(btn.dataset.val)));

  document.getElementById('scaleFactor').addEventListener('input', () => {
    document.querySelectorAll('#presets button').forEach(b => b.classList.remove('active'));
    calc();
  });

  document.getElementById('inputValue').addEventListener('input', calc);

  document.querySelectorAll('#input-unit-control button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#input-unit-control button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      inputUnit = btn.dataset.val;
      calc();
    });
  });

  document.querySelectorAll('#output-unit-control button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#output-unit-control button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      outputUnit = btn.dataset.val;
      calc();
    });
  });

  document.getElementById('copyTrigger').addEventListener('click', () => {
    const txt = document.getElementById('resultValue').textContent;
    navigator.clipboard.writeText(txt).catch(() => {
      const ta = Object.assign(document.createElement('textarea'), { value: txt, style: 'position:fixed;left:-9999px' });
      document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    });
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1400);
  });

  calc();
</script>
</body>
</html>

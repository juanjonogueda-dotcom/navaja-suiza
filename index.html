<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navaja Suiza</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #000000;
  }

  body {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .wordmark {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-weight: 800;
    font-size: clamp(72px, 12vw, 160px);
    color: #ffffff;
    letter-spacing: -0.04em;
    line-height: 0.9;
    text-align: center;
    user-select: none;
    pointer-events: none;
  }

  .shape {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    cursor: pointer;
  }

  .shape svg {
    display: block;
    opacity: 0.9;
    transition: transform 0.25s ease;
  }

  .shape:hover svg {
    transform: scale(1.06);
  }

  .shape-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: lowercase;
    color: #ffffff;
    opacity: 0;
    transition: opacity 0.25s ease;
    white-space: nowrap;
  }

  .shape:hover .shape-label {
    opacity: 1;
  }

  .shape-escalimetro {
    top: 8%;
    right: 6%;
    transform: rotate(-15deg);
  }

  .shape-rampa {
    bottom: 10%;
    left: 5%;
    transform: rotate(8deg);
  }

  .shape-escalera {
    top: 50%;
    right: 8%;
    transform: translateY(-50%) rotate(-5deg);
  }
</style>
</head>
<body>

  <h1 class="wordmark">Navaja Suiza</h1>

  <!-- Escalímetro: long ruler with scale marks, top right -->
  <a class="shape shape-escalimetro" href="escalimetro.html" aria-label="Escalímetro">
    <svg width="320" height="44" viewBox="0 0 320 44" xmlns="http://www.w3.org/2000/svg">
      <!-- Major ticks every 40px (3px wide × 14px tall) -->
      <rect x="0"   y="0" width="3" height="14" fill="white"/>
      <rect x="40"  y="0" width="3" height="14" fill="white"/>
      <rect x="80"  y="0" width="3" height="14" fill="white"/>
      <rect x="120" y="0" width="3" height="14" fill="white"/>
      <rect x="160" y="0" width="3" height="14" fill="white"/>
      <rect x="200" y="0" width="3" height="14" fill="white"/>
      <rect x="240" y="0" width="3" height="14" fill="white"/>
      <rect x="280" y="0" width="3" height="14" fill="white"/>
      <rect x="317" y="0" width="3" height="14" fill="white"/>
      <!-- Minor ticks every 10px (2px wide × 7px tall) -->
      <rect x="10"  y="7" width="2" height="7" fill="white"/>
      <rect x="20"  y="7" width="2" height="7" fill="white"/>
      <rect x="30"  y="7" width="2" height="7" fill="white"/>
      <rect x="50"  y="7" width="2" height="7" fill="white"/>
      <rect x="60"  y="7" width="2" height="7" fill="white"/>
      <rect x="70"  y="7" width="2" height="7" fill="white"/>
      <rect x="90"  y="7" width="2" height="7" fill="white"/>
      <rect x="100" y="7" width="2" height="7" fill="white"/>
      <rect x="110" y="7" width="2" height="7" fill="white"/>
      <rect x="130" y="7" width="2" height="7" fill="white"/>
      <rect x="140" y="7" width="2" height="7" fill="white"/>
      <rect x="150" y="7" width="2" height="7" fill="white"/>
      <rect x="170" y="7" width="2" height="7" fill="white"/>
      <rect x="180" y="7" width="2" height="7" fill="white"/>
      <rect x="190" y="7" width="2" height="7" fill="white"/>
      <rect x="210" y="7" width="2" height="7" fill="white"/>
      <rect x="220" y="7" width="2" height="7" fill="white"/>
      <rect x="230" y="7" width="2" height="7" fill="white"/>
      <rect x="250" y="7" width="2" height="7" fill="white"/>
      <rect x="260" y="7" width="2" height="7" fill="white"/>
      <rect x="270" y="7" width="2" height="7" fill="white"/>
      <rect x="290" y="7" width="2" height="7" fill="white"/>
      <rect x="300" y="7" width="2" height="7" fill="white"/>
      <rect x="310" y="7" width="2" height="7" fill="white"/>
      <!-- Ruler body -->
      <rect x="0" y="14" width="320" height="30" fill="white"/>
    </svg>
    <span class="shape-label">escalímetro</span>
  </a>

  <!-- Rampa: triangular ramp profile, bottom left -->
  <a class="shape shape-rampa" href="pendientes.html" aria-label="Rampa">
    <svg width="200" height="120" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
      <path d="M 0,120 L 200,120 L 200,0 Z" fill="white"/>
    </svg>
    <span class="shape-label">rampa</span>
  </a>

  <!-- Escalera: staircase profile with 4 steps, center right -->
  <a class="shape shape-escalera" href="pendientes.html" aria-label="Escalera">
    <svg width="160" height="120" viewBox="0 0 160 120" xmlns="http://www.w3.org/2000/svg">
      <path d="M 0,0 L 40,0 L 40,30 L 80,30 L 80,60 L 120,60 L 120,90 L 160,90 L 160,120 L 0,120 Z" fill="white"/>
    </svg>
    <span class="shape-label">escalera</span>
  </a>

</body>
</html>

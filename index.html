<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #000000;
    --surface:      #0d0d0d;
    --border:       rgba(255,255,255,0.55);
    --border-hover: #ffffff;
    --text:         #ffffff;
    --text-mid:     rgba(255,255,255,0.88);
    --text-muted:   rgba(255,255,255,0.75);
    --accent:       #ffffff;
    --warn:         #ff6b6b;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  body { position: relative; }

  .shape {
    position: fixed;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    cursor: grab;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }

  .shape.dragging { cursor: grabbing; }
  .shape.dragging svg { pointer-events: none; }

  .shape svg {
    display: block;
    opacity: 1;
    transition: transform 0.25s ease;
  }

  .shape:not(.dragging):hover svg { transform: scale(1.06); }

  .shape-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: lowercase;
    color: var(--text);
    opacity: 0;
    transition: opacity 0.25s ease;
    white-space: nowrap;
  }

  .shape:not(.dragging):hover .shape-label { opacity: 1; }

  /* Default positions — JS reads these and normalizes to left/top % */
  .shape-escalimetro { top: 12%;    left: 6%; }
  .shape-rampa       { top: 38%;    right: 8%; }
  .shape-escalera    { bottom: 12%; left: 18%; }

  @media (max-width: 760px) {
    .shape-escalimetro { top: 8%;    left: 4%; }
    .shape-rampa       { top: 45%;   right: 5%; }
    .shape-escalera    { bottom: 8%; left: 10%; }
  }

  /* Reset button */
  #resetBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: none;
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    z-index: 100;
  }
  #resetBtn:hover {
    color: var(--bg);
    background: var(--accent);
    border-color: var(--border-hover);
  }

  /* Mobile hint */
  #mobileHint {
    position: fixed;
    bottom: 20px;
    left: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    line-height: 1.5;
    z-index: 100;
    pointer-events: none;
    display: none;
  }
  @media (hover: none) and (pointer: coarse) {
    #mobileHint { display: block; }
  }
</style>
</head>
<body>

  <!-- Escalímetro: long ruler with scale marks -->
  <a class="shape shape-escalimetro" href="escalimetro.html" aria-label="Escalímetro">
    <svg width="320" height="44" viewBox="0 0 320 44" xmlns="http://www.w3.org/2000/svg">

      <rect x="200" y="0" width="3" height="14" fill="white"/>

    </svg>

  </a>

  <a class="shape shape-rampa" href="pendientes.html" aria-label="Rampa">
    <svg width="200" height="120" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
      <path d="M 0,120 L 200,120 L 200,0 Z" fill="white"/>

  <a class="shape shape-escalera" href="escaleras.html" aria-label="Escalera">
    <svg width="160" height="120" viewBox="0 0 160 120" xmlns="http://www.w3.org/2000/svg">
      <path d="M 0,0 L 40,0 L 40,30 L 80,30 L 80,60 L 120,60 L 120,90 L 160,90 L 160,120 L 0,120 Z" fill="white"/>
    </svg>
    <span class="shape-label">escalera</span>
  </a>

  <span id="mobileHint">arrastra · 2 dedos rotan</span>
  <button id="resetBtn">reset</button>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const NAMES = ['escalimetro', 'rampa', 'escalera'];
  const ROTS_DEFAULT = { escalimetro: -8, rampa: 5, escalera: -4 };
  const KEYS = { escalimetro: 'ns-pos-escalimetro', rampa: 'ns-pos-rampa', escalera: 'ns-pos-escalera' };

  const els = {
    escalimetro: document.querySelector('.shape-escalimetro'),
    rampa:       document.querySelector('.shape-rampa'),
    escalera:    document.querySelector('.shape-escalera'),
  };

  const defaults = {};
  const rotation = { ...ROTS_DEFAULT };
  let active = null, startX = 0, startY = 0, origLeft = 0, origTop = 0;
  let hasDragged = false;
  let rotateState = null;  // { name, startAngle, baseRot }

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  function setPos(el, leftPct, topPct) {
    el.style.left   = leftPct + '%';
    el.style.top    = topPct  + '%';
    el.style.right  = 'auto';
    el.style.bottom = 'auto';
  }
  function getPos(el) {
    const r = el.getBoundingClientRect();
    return { left: r.left / window.innerWidth * 100, top: r.top / window.innerHeight * 100 };
  }
  function applyRot(name) {
    els[name].style.transform = `rotate(${rotation[name]}deg)`;
  }
  function save(name) {
    try {
      const pos = getPos(els[name]);
      localStorage.setItem(KEYS[name], JSON.stringify({ left: pos.left, top: pos.top, rot: rotation[name] }));
    } catch (e) {}
  }
  function angleBetween(t0, t1) {
    return Math.atan2(t1.clientY - t0.clientY, t1.clientX - t0.clientX) * 180 / Math.PI;
  }

  // Initialize positions + rotations
  NAMES.forEach(name => {
    const el = els[name];
    applyRot(name);
    const r = el.getBoundingClientRect();
    defaults[name] = { left: r.left / window.innerWidth * 100, top: r.top / window.innerHeight * 100 };
    try {
      const saved = localStorage.getItem(KEYS[name]);
      if (saved) {
        const d = JSON.parse(saved);
        if (typeof d.left === 'number' && typeof d.top === 'number') setPos(el, d.left, d.top);
        if (typeof d.rot  === 'number') { rotation[name] = d.rot; applyRot(name); }
      }
    } catch (e) {}
  });

  // Drag/rotate start
  function onDown(e, name) {
    // Two-finger pinch-rotate
    if (e.touches && e.touches.length >= 2) {
      e.preventDefault();
      rotateState = {
        name,
        startAngle: angleBetween(e.touches[0], e.touches[1]),
        baseRot:    rotation[name]
      };
      active = null;
      hasDragged = true;
      els[name].classList.add('dragging');
      els[name].style.zIndex = '10';
      els[name].style.transition = 'none';
      return;
    }
    if (e.button !== undefined && e.button !== 0) return;
    if (!e.touches) e.preventDefault();
    const t = e.touches ? e.touches[0] : e;
    active = name;
    startX = t.clientX;
    startY = t.clientY;
    const r = els[name].getBoundingClientRect();
    origLeft = r.left;
    origTop  = r.top;
    hasDragged = false;
    els[name].classList.add('dragging');
    els[name].style.zIndex     = '10';
    els[name].style.transition = 'none';
    document.body.style.cursor = 'grabbing';
  }

  NAMES.forEach(name => {
    els[name].addEventListener('mousedown',  e => onDown(e, name));
    els[name].addEventListener('touchstart', e => onDown(e, name), { passive: false });
    els[name].addEventListener('click', e => { if (hasDragged) { e.preventDefault(); hasDragged = false; } });
  });

  // Move handler — handles both drag and rotate
  function onMove(e) {
    if (rotateState && e.touches && e.touches.length >= 2) {
      e.preventDefault();
      const cur = angleBetween(e.touches[0], e.touches[1]);
      rotation[rotateState.name] = rotateState.baseRot + (cur - rotateState.startAngle);
      applyRot(rotateState.name);
      return;
    }
    if (!active) return;
    const t  = e.touches ? e.touches[0] : e;
    if (!hasDragged && Math.hypot(t.clientX - startX, t.clientY - startY) > 12) hasDragged = true;
    if (hasDragged) e.preventDefault();
    if (!hasDragged) return;
    const el = els[active];
    const r  = el.getBoundingClientRect();
    const vw = window.innerWidth, vh = window.innerHeight;
    const m  = 20;
    const newLeft = clamp(origLeft + (t.clientX - startX), m, vw - r.width  - m);
    const newTop  = clamp(origTop  + (t.clientY - startY), m, vh - r.height - m);
    el.style.left   = newLeft + 'px';
    el.style.top    = newTop  + 'px';
    el.style.right  = 'auto';
    el.style.bottom = 'auto';
  }

  document.addEventListener('mousemove',  onMove);
  document.addEventListener('touchmove',  onMove, { passive: false });

  function endShape(name) {
    const el = els[name];
    el.style.zIndex     = '';
    el.style.transition = '';
    el.classList.remove('dragging');
    document.body.style.cursor = '';
  }

  function onUp() {
    if (!active) return;
    const name = active;
    active = null;
    const el = els[name];
    const pos = getPos(el);
    setPos(el, pos.left, pos.top);
    endShape(name);
    save(name);
  }

  document.addEventListener('mouseup',  onUp);
  document.addEventListener('touchend', e => {
    if (rotateState) {
      if (!e.touches || e.touches.length < 2) {
        const name = rotateState.name;
        rotateState = null;
        endShape(name);
        save(name);
        hasDragged = false;
      }
      return;
    }
    const wasDragging = hasDragged;
    const name = active;
    onUp();
    if (!wasDragging && name) {
      window.location.href = els[name].getAttribute('href');
    }
  });

  // Reset
  document.getElementById('resetBtn').addEventListener('click', () => {
    NAMES.forEach(name => {
      try { localStorage.removeItem(KEYS[name]); } catch (e) {}
      const el = els[name];
      rotation[name] = ROTS_DEFAULT[name];
      el.style.transition = 'left 300ms ease, top 300ms ease, transform 300ms ease';
      setPos(el, defaults[name].left, defaults[name].top);
      applyRot(name);
      setTimeout(() => { el.style.transition = ''; }, 350);
    });
  });
});
</script>
</body>
</html>

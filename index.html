<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navaja Suiza</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #000000;
  }

  body { position: relative; }

  .shape {
    position: fixed;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    cursor: grab;
    touch-action: none;
    user-select: none;
  }

  .shape.dragging {
    cursor: grabbing;
  }
  .shape.dragging svg {
    pointer-events: none;
    transform: none !important;
  }

  .shape svg {
    display: block;
    opacity: 0.9;
    transition: transform 0.25s ease;
  }

  .shape:not(.dragging):hover svg {
    transform: scale(1.06);
  }

  .shape-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: lowercase;
    color: #ffffff;
    opacity: 0;
    transition: opacity 0.25s ease;
    white-space: nowrap;
  }

  .shape:not(.dragging):hover .shape-label {
    opacity: 1;
  }

  /* Default positions — JS reads these and normalizes to left/top % */
  .shape-escalimetro {
    top: 12%;
    left: 6%;
    transform: rotate(-8deg);
  }
  .shape-rampa {
    top: 38%;
    right: 8%;
    transform: rotate(5deg);
  }
  .shape-escalera {
    bottom: 12%;
    left: 18%;
    transform: rotate(-4deg);
  }

  @media (max-width: 480px) {
    .shape-escalimetro { top: 8%;    left: 4%; }
    .shape-rampa       { top: 45%;   right: 5%; }
    .shape-escalera    { bottom: 8%; left: 10%; }
  }

  /* Reset button */
  #resetBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: none;
    border: none;
    padding: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.2);
    cursor: pointer;
    transition: color 0.15s;
    z-index: 100;
  }
  #resetBtn:hover { color: rgba(255,255,255,0.5); }
</style>
</head>
<body>

  <!-- Escalímetro: long ruler with scale marks -->
  <a class="shape shape-escalimetro" href="escalimetro.html" aria-label="Escalímetro">
    <svg width="320" height="44" viewBox="0 0 320 44" xmlns="http://www.w3.org/2000/svg">
      <!-- Major ticks every 40px (3px wide × 14px tall) -->
      <rect x="0"   y="0" width="3" height="14" fill="white"/>
      <rect x="40"  y="0" width="3" height="14" fill="white"/>
      <rect x="80"  y="0" width="3" height="14" fill="white"/>
      <rect x="120" y="0" width="3" height="14" fill="white"/>
      <rect x="160" y="0" width="3" height="14" fill="white"/>
      <rect x="200" y="0" width="3" height="14" fill="white"/>
      <rect x="240" y="0" width="3" height="14" fill="white"/>
      <rect x="280" y="0" width="3" height="14" fill="white"/>
      <rect x="317" y="0" width="3" height="14" fill="white"/>
      <!-- Minor ticks every 10px (2px wide × 7px tall) -->
      <rect x="10"  y="7" width="2" height="7" fill="white"/>
      <rect x="20"  y="7" width="2" height="7" fill="white"/>
      <rect x="30"  y="7" width="2" height="7" fill="white"/>
      <rect x="50"  y="7" width="2" height="7" fill="white"/>
      <rect x="60"  y="7" width="2" height="7" fill="white"/>
      <rect x="70"  y="7" width="2" height="7" fill="white"/>
      <rect x="90"  y="7" width="2" height="7" fill="white"/>
      <rect x="100" y="7" width="2" height="7" fill="white"/>
      <rect x="110" y="7" width="2" height="7" fill="white"/>
      <rect x="130" y="7" width="2" height="7" fill="white"/>
      <rect x="140" y="7" width="2" height="7" fill="white"/>
      <rect x="150" y="7" width="2" height="7" fill="white"/>
      <rect x="170" y="7" width="2" height="7" fill="white"/>
      <rect x="180" y="7" width="2" height="7" fill="white"/>
      <rect x="190" y="7" width="2" height="7" fill="white"/>
      <rect x="210" y="7" width="2" height="7" fill="white"/>
      <rect x="220" y="7" width="2" height="7" fill="white"/>
      <rect x="230" y="7" width="2" height="7" fill="white"/>
      <rect x="250" y="7" width="2" height="7" fill="white"/>
      <rect x="260" y="7" width="2" height="7" fill="white"/>
      <rect x="270" y="7" width="2" height="7" fill="white"/>
      <rect x="290" y="7" width="2" height="7" fill="white"/>
      <rect x="300" y="7" width="2" height="7" fill="white"/>
      <rect x="310" y="7" width="2" height="7" fill="white"/>
      <!-- Ruler body -->
      <rect x="0" y="14" width="320" height="30" fill="white"/>
    </svg>
    <span class="shape-label">escalímetro</span>
  </a>

  <!-- Rampa: triangular ramp profile -->
  <a class="shape shape-rampa" href="pendientes.html" aria-label="Rampa">
    <svg width="200" height="120" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
      <path d="M 0,120 L 200,120 L 200,0 Z" fill="white"/>
    </svg>
    <span class="shape-label">rampa</span>
  </a>

  <!-- Escalera: staircase profile with 4 steps -->
  <a class="shape shape-escalera" href="pendientes.html" aria-label="Escalera">
    <svg width="160" height="120" viewBox="0 0 160 120" xmlns="http://www.w3.org/2000/svg">
      <path d="M 0,0 L 40,0 L 40,30 L 80,30 L 80,60 L 120,60 L 120,90 L 160,90 L 160,120 L 0,120 Z" fill="white"/>
    </svg>
    <span class="shape-label">escalera</span>
  </a>

  <button id="resetBtn">reset</button>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const NAMES = ['escalimetro', 'rampa', 'escalera'];
  const ROTS  = { escalimetro: -8, rampa: 5, escalera: -4 };
  const KEYS  = { escalimetro: 'ns-pos-escalimetro', rampa: 'ns-pos-rampa', escalera: 'ns-pos-escalera' };

  const els = {
    escalimetro: document.querySelector('.shape-escalimetro'),
    rampa:       document.querySelector('.shape-rampa'),
    escalera:    document.querySelector('.shape-escalera'),
  };

  const defaults = {};
  let active = null, startX = 0, startY = 0, origLeft = 0, origTop = 0;

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  function setPos(el, leftPct, topPct) {
    el.style.left   = leftPct + '%';
    el.style.top    = topPct  + '%';
    el.style.right  = 'auto';
    el.style.bottom = 'auto';
  }

  function getPos(el) {
    const r = el.getBoundingClientRect();
    return { left: r.left / window.innerWidth * 100, top: r.top / window.innerHeight * 100 };
  }

  // Initialize positions
  NAMES.forEach(name => {
    const el = els[name];
    // Override to rotation-only transform (removes translateY etc.)
    el.style.transform = `rotate(${ROTS[name]}deg)`;
    // Capture CSS default position before any saved positions are applied
    const r = el.getBoundingClientRect();
    defaults[name] = { left: r.left / window.innerWidth * 100, top: r.top / window.innerHeight * 100 };
    // Apply saved position if available
    try {
      const saved = localStorage.getItem(KEYS[name]);
      if (saved) {
        const { left, top } = JSON.parse(saved);
        setPos(el, left, top);
      }
    } catch (e) {}
  });

  // Drag start
  function onDown(e, name) {
    if (e.button !== undefined && e.button !== 0) return;
    e.preventDefault();
    const t = e.touches ? e.touches[0] : e;
    active = name;
    startX = t.clientX;
    startY = t.clientY;
    const r = els[name].getBoundingClientRect();
    origLeft = r.left;
    origTop  = r.top;
    els[name].classList.add('dragging');
    els[name].style.zIndex     = '10';
    els[name].style.transition = 'none';
    document.body.style.cursor = 'grabbing';
  }

  NAMES.forEach(name => {
    els[name].addEventListener('mousedown',  e => onDown(e, name));
    els[name].addEventListener('touchstart', e => onDown(e, name), { passive: false });
  });

  // Drag move
  function onMove(e) {
    if (!active) return;
    e.preventDefault();
    const t  = e.touches ? e.touches[0] : e;
    const el = els[active];
    const r  = el.getBoundingClientRect();
    const vw = window.innerWidth, vh = window.innerHeight;
    const m  = 20;
    const newLeft = clamp(origLeft + (t.clientX - startX), m, vw - r.width  - m);
    const newTop  = clamp(origTop  + (t.clientY - startY), m, vh - r.height - m);
    el.style.left   = newLeft + 'px';
    el.style.top    = newTop  + 'px';
    el.style.right  = 'auto';
    el.style.bottom = 'auto';
  }

  document.addEventListener('mousemove',  onMove);
  document.addEventListener('touchmove',  onMove, { passive: false });

  // Drag end
  function onUp() {
    if (!active) return;
    const name = active;
    const el   = els[name];
    active = null;
    const pos = getPos(el);
    setPos(el, pos.left, pos.top);
    el.style.zIndex     = '';
    el.style.transition = '';
    el.classList.remove('dragging');
    document.body.style.cursor = '';
    try { localStorage.setItem(KEYS[name], JSON.stringify(pos)); } catch (e) {}
  }

  document.addEventListener('mouseup',  onUp);
  document.addEventListener('touchend', onUp);

  // Reset
  document.getElementById('resetBtn').addEventListener('click', () => {
    NAMES.forEach(name => {
      try { localStorage.removeItem(KEYS[name]); } catch (e) {}
      const el = els[name];
      el.style.transition = 'left 300ms ease, top 300ms ease';
      setPos(el, defaults[name].left, defaults[name].top);
      setTimeout(() => { el.style.transition = ''; }, 350);
    });
  });
});
</script>
</body>
</html>
